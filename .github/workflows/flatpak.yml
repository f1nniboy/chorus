name: Flatpak bundle

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: chorus.flatpak
          manifest-path: space.f1nn.chorus.dev.yml
          cache-key: flatpak-builder-${{ hashFiles('go.sum', 'space.f1nn.chorus.dev.yml') }}

      - uses: softprops/action-gh-release@v2
        with:
          files: chorus.flatpak
