name: Flatpak bundle

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v7

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: chorus.flatpak
          manifest-path: space.f1nn.chorus.dev.yml
          cache-key: flatpak-builder-${{ hashFiles('go.sum', 'space.f1nn.chorus.dev.yml') }}

      - if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: chorus.flatpak
