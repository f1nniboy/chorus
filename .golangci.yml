version: "2"

linters:
  disable:
    # defer/Write/Close error returns are intentionally ignored throughout,
    # adding checks everywhere would only be noise
    - errcheck
  enable:
    - revive
    - govet
    - staticcheck
    - misspell
    - gocritic
    - nilerr
    - bodyclose
    - forbidigo
    - mirror
  settings:
    staticcheck:
      checks:
        - all
        # package-level doc comment required
        - -ST1000
        # godoc "FuncName ..." form required
        - -ST1020
        - -ST1021
        # suggest removing redundant embedded field selectors, it's fine
        - -QF1008
    revive:
      enable-all-rules: true
      rules:
        # conflicts with our "casual" comment style
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        # redundant, errcheck is already disabled project-wide
        - name: unhandled-error
          disabled: true
        # no agreed Go line length standard
        - name: line-length-limit
          disabled: true
        # splitting main() and large handlers would hurt readability more than help
        - name: function-length
          disabled: true
        # bool control params are used intentionally (e.g. animate on scroll helpers)
        - name: flag-parameter
          disabled: true
        # inline structs for one-off JSON bodies are fine
        - name: nested-structs
          disabled: true
        # named constants for 0, "", 1000 etc. would only add noise
        - name: add-constant
          disabled: true
        # subjective
        - name: cognitive-complexity
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: max-public-structs
          disabled: true
        # interface method impls don't reference receiver by design
        - name: unused-receiver
          disabled: true
        # unhandled switch cases are meant to silently no-op, by design
        - name: enforce-switch-style
          disabled: true
        # zero value is an intentional fallback for D-Bus/reflect asserts
        - name: unchecked-type-assertion
          disabled: true

    govet:
      enable-all: true
      disable:
        # variable shadowing is checked by import-shadowing in revive already
        - shadow

  exclusions:
    rules:
      # cmd/ tools print their result directly
      - path: ^cmd/
        linters:
          - forbidigo
      # f.Label is a static struct-tag value passed through locale.Get for
      # translation, not user input, so not a real format-string risk
      - linters:
          - govet
        text: "non-constant format string in call to github\\.com/f1nniboy/chorus/internal/locale\\.Get"
